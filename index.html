<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<meta http-equiv="refresh" content="0; url=batman/index.html" />
	<title>sudhanshu.engineer</title>
	<meta name="description" content="sudhanshu.engineer" />
	<meta property="og:title" content="sudhanshu.engineer" />
	<meta property="og:description" content="sudhanshu.engineer" />
	<meta property="og:url" content="https://sudhanshu.engineer" />
	<meta name="twitter:title" content="sudhanshu.engineer" />
	<meta name="twitter:description" content="sudhanshu.engineer" />
	<style>
		:root {
			color-scheme: dark;
			--surface: rgba(255, 255, 255, 0.06);
			--text: #f5f7fb;
			--muted: #9aa3b2;
			--accent: #ffd700;
			--accent-2: #ffa500;
		}

		* {
			box-sizing: border-box;
		}

		html,
		body {
			height: 100%;
		}

		body {
			margin: 0;
			font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
			background:
				radial-gradient(circle at top, rgba(255, 215, 0, 0.16), transparent 34%),
				linear-gradient(180deg, #0b0b12 0%, #050507 100%);
			color: var(--text);
			display: grid;
			place-items: center;
			padding: 24px;
		}

		.panel {
			width: min(560px, 100%);
			padding: 32px;
			border-radius: 28px;
			background: var(--surface);
			border: 1px solid rgba(255, 255, 255, 0.12);
			backdrop-filter: blur(18px);
			box-shadow: 0 30px 90px -40px rgba(0, 0, 0, 0.8);
			text-align: center;
		}

		.kicker {
			margin: 0 0 10px;
			text-transform: uppercase;
			letter-spacing: 0.26em;
			font-size: 0.78rem;
			color: var(--muted);
		}

		h1 {
			margin: 0;
			font-size: clamp(2.2rem, 6vw, 3.8rem);
			line-height: 1;
			background: linear-gradient(135deg, var(--accent), var(--accent-2));
			-webkit-background-clip: text;
			-webkit-text-fill-color: transparent;
			background-clip: text;
		}

		p {
			margin: 14px 0 0;
			color: var(--muted);
			line-height: 1.7;
		}

		.fineprint {
			margin-top: 18px;
			font-size: 0.9rem;
		}
	</style>
</head>
<body>
	<main class="panel" role="main" aria-label="sudhanshu.engineer">
		<p class="kicker">sudhanshu.engineer</p>
		<h1>sudhanshu.engineer</h1>
		<p>Redirecting to the portfolio experience.</p>
		<p class="fineprint">If your browser does not redirect automatically, open the site directly.</p>
	</main>
	<script>
		window.location.replace('batman/index.html');
	</script>
</body>
</html>
